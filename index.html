<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body class="bg-light d-flex align-items-center vh-100">

    <div class="container w-100">
        <div class="row justify-content-center w-100 m-0">
            <div class="col-12 col-md-8 col-lg-5 col-xl-4">
                <div class="card shadow rounded-4 border-0">
                    <div class="card-body p-4 p-sm-5">
                        <h2 class="text-center mb-4">Login</h2>
                        <form>
                            <div class="mb-3">
                                <label for="emailInput" class="form-label">E-mail</label>
                                <input type="email" class="form-control" id="emailInput" placeholder="Digite seu e-mail"
                                    required>
                            </div>
                            <div class="mb-3">
                                <label for="passwordInput" class="form-label">Senha</label>
                                <input type="password" class="form-control" id="passwordInput"
                                    placeholder="Digite sua senha" required>
                            </div>
                            <div class="d-grid gap-2 mb-3 mt-4">
                                <button type="submit" class="btn btn-primary btn-lg">Entrar</button>
                            </div>
                            <div class="text-center mt-3">
                                <a href="#" class="text-decoration-none">Esqueci minha senha</a>
                            </div>
                            <div class="text-center mt-2">
                                <span class="text-muted">Não tem uma conta? <a href="#"
                                        class="text-decoration-none">Criar conta</a></span>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmxc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
